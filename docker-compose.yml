services:
  backend:
    build: ./backend
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev

      # ✅ Use internal docker service name (NOT host.docker.internal)
      DATABASE_URL: jdbc:postgresql://db:5432/postgres
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres

      REDIS_HOST: redis

      MODEL_SERVER_URL: http://host.docker.internal:8000
      MODEL_SERVER_MOCK: ${MODEL_SERVER_MOCK:-true}

      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-}
      SUPABASE_JWT_AUDIENCE: authenticated
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  pgdata: